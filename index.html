<script>
    // ======================== 1. FUNCIONES DE LIMPIEZA (sin cambios) ========================
    function limpiarTexto(texto) {
        if (!texto) return "";
        return texto.toString()
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .trim();
    }

    function formatearTextoPresentacion(str) {
        if (!str) return '';
        str = str.replace(/\bBrewery\b/gi, "Brew.")
                 .replace(/\bBrewing\b/gi, "Brew.")
                 .replace(/\bCompany\b/gi, "Co.")
                 .replace(/\bCompañía\b/gi, "Cia.")
                 .replace(/Colaboración/gi, "(Colab.)");
        return str.replace(/\b\w/g, l => l.toUpperCase());
    }

    function esBasura(valor) {
        if (!valor) return true;
        const limpio = valor.toString().toUpperCase().trim();
        return limpio === "PENDIENTE" || limpio === "COMPLETAR" || limpio === "-";
    }

    // ======================== 2. CARGA DE CSV CON XMLHttpRequest (compatible iOS 12) ========================
    let allData = [];

    function showError(msg) {
        const errDiv = document.getElementById('error-message');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        console.error(msg);
    }

    function parseCSV(texto) {
        // Soporta \r\n o \n
        const lineas = texto.split(/\r?\n/);
        if (lineas.length === 0) return [];
        const encabezados = lineas[0].split(';').map(h => h.trim());
        const datos = [];
        for (var i = 1; i < lineas.length; i++) {
            var linea = lineas[i].trim();
            if (linea === "") continue;
            var valores = linea.split(';');
            var fila = {};
            for (var j = 0; j < encabezados.length; j++) {
                var enc = encabezados[j];
                var val = valores[j] ? valores[j].trim() : '';
                if (enc === 'cerveceria' || enc === 'cerveza_ganadora' || enc === 'estilo' || enc === 'certamen') {
                    val = formatearTextoPresentacion(val);
                }
                fila[enc] = val;
            }
            if (!esBasura(fila.medalla_base) && !esBasura(fila.cerveceria)) {
                datos.push(fila);
            }
        }
        return datos;
    }

    function cargarCSV(callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'BBDD_Medallero_Chile.csv', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200 || xhr.status === 0) { // 0 para archivos locales
                    var texto = xhr.responseText;
                    var datos = parseCSV(texto);
                    console.log("CSV cargado: " + datos.length + " registros");
                    callback(null, datos);
                } else {
                    callback(new Error("No se pudo cargar el CSV. HTTP " + xhr.status), null);
                }
            }
        };
        xhr.onerror = function() {
            callback(new Error("Error de red o archivo no encontrado"), null);
        };
        xhr.send();
    }

    // ======================== 3. GRÁFICOS Y DEMÁS (sin cambios funcionales, solo adaptación a variables) ========================
    var evolucionChart, rankingChileChart, topEstilosGlobal, topEstilosChile, topRegionesChile;

    function renderEvolucionMensual(data) {
        var data2025 = data.filter(function(item) {
            var anio = item.anio || (item.fecha ? item.fecha.split('-')[0] : '');
            return anio === '2025';
        });
        if (!data2025.length) return;
        var meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        var paises = ['Brasil','Chile','Argentina'];
        var agrupado = { Brasil: Array(12).fill(0), Chile: Array(12).fill(0), Argentina: Array(12).fill(0) };
        data2025.forEach(function(item) {
            var fecha = item.fecha;
            if (!fecha) return;
            var mes = fecha.split('-')[1];
            var pais = item.pais;
            if (!pais || paises.indexOf(pais) === -1) return;
            var idx = parseInt(mes) - 1;
            if (idx >= 0 && idx < 12) agrupado[pais][idx]++;
        });
        var ctx = document.getElementById('evolucionMensualChart').getContext('2d');
        if (evolucionChart) evolucionChart.destroy();
        var datasets = paises.map(function(p) {
            return {
                label: p,
                data: agrupado[p],
                borderColor: p === 'Brasil' ? '#f7c32f' : (p === 'Chile' ? '#e32c6c' : '#1eab9b'),
                backgroundColor: p === 'Brasil' ? 'rgba(247,195,47,0.2)' : (p === 'Chile' ? 'rgba(227,44,108,0.2)' : 'rgba(30,171,155,0.2)'),
                fill: true, tension: 0.4, pointRadius: 3, pointHoverRadius: 6
            };
        });
        evolucionChart = new Chart(ctx, {
            type: 'line',
            data: { labels: meses, datasets: datasets },
            options: {
                responsive: true, maintainAspectRatio: true,
                plugins: { tooltip: { mode: 'index', intersect: false }, legend: { labels: { color: '#fff' } } },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { ticks: { color: '#fff' }, grid: { display: false } }
                }
            }
        });
    }

    function renderRankingChile(data) {
        var chileData = data.filter(function(item) { return item.pais === 'Chile'; });
        var breweries = {};
        chileData.forEach(function(item) {
            var nombre = item.cerveceria;
            var medalla = item.medalla_base;
            if (!nombre) return;
            if (!breweries[nombre]) breweries[nombre] = { oro:0, plata:0, bronce:0 };
            if (medalla && medalla.toLowerCase() === 'oro') breweries[nombre].oro++;
            else if (medalla && medalla.toLowerCase() === 'plata') breweries[nombre].plata++;
            else if (medalla && medalla.toLowerCase() === 'bronce') breweries[nombre].bronce++;
        });
        var ranking = Object.keys(breweries).map(function(nom) {
            var vals = breweries[nom];
            return { nom: nom, total: vals.oro+vals.plata+vals.bronce, oro: vals.oro, plata: vals.plata, bronce: vals.bronce };
        }).sort(function(a,b) { return b.total - a.total; }).slice(0,10);
        var labels = ranking.map(function(r) { return r.nom; });
        var oro = ranking.map(function(r) { return r.oro; });
        var plata = ranking.map(function(r) { return r.plata; });
        var bronce = ranking.map(function(r) { return r.bronce; });
        var ctx = document.getElementById('rankingChileChart').getContext('2d');
        if (rankingChileChart) rankingChileChart.destroy();
        rankingChileChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '🥇 Oro', data: oro, backgroundColor: '#e32c6c', stack: 'stack' },
                    { label: '🥈 Plata', data: plata, backgroundColor: '#1eab9b', stack: 'stack' },
                    { label: '🥉 Bronce', data: bronce, backgroundColor: '#f7c32f', stack: 'stack' }
                ]
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: true,
                plugins: {
                    tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.raw + ' medallas'; } } },
                    legend: { labels: { color: '#fff' } }
                },
                scales: {
                    x: { stacked: true, ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                    y: { stacked: true, ticks: { color: '#fff' }, grid: { display: false } }
                }
            }
        });
    }

    function obtenerDetalleCervezas(nombreCerveceria, dataCompleta) {
        var busqueda = limpiarTexto(nombreCerveceria);
        var medallas = dataCompleta.filter(function(d) {
            return limpiarTexto(d.cerveceria) === busqueda && !esBasura(d.cerveza_ganadora) && !esBasura(d.estilo);
        });
        if (medallas.length === 0) return "Sin medallas destacadas";
        var conteo = {};
        medallas.forEach(function(m) {
            var nombreCerveza = m.cerveza_ganadora || "Sin nombre";
            var estilo = m.estilo || "Estilo no definido";
            var llave = nombreCerveza + " (" + estilo + ")";
            conteo[llave] = (conteo[llave] || 0) + 1;
        });
        var mejores2 = Object.keys(conteo).map(function(k) { return { nombre: k, total: conteo[k] }; })
            .sort(function(a,b) { return b.total - a.total; }).slice(0,2);
        return mejores2.map(function(m) { return "• " + m.nombre + ": " + m.total + " medallas"; }).join('<br>');
    }

    function renderPodio(data) {
        var paises = ['Brasil', 'Chile', 'Argentina'];
        var podio = {};
        paises.forEach(function(p) {
            var paisesData = data.filter(function(item) { return item.pais === p; });
            var breweries = {};
            paisesData.forEach(function(item) {
                var nombre = item.cerveceria;
                if (!nombre) return;
                breweries[nombre] = (breweries[nombre] || 0) + 1;
            });
            var top3 = Object.keys(breweries).map(function(name) { return { name: name, count: breweries[name] }; })
                .sort(function(a,b) { return b.count - a.count; }).slice(0,3);
            podio[p] = top3;
        });
        var container = document.getElementById('podio-container');
        container.innerHTML = '';
        paises.forEach(function(p) {
            var col = document.createElement('div');
            col.className = 'podio-col';
            var totalMedallas = data.filter(function(item) { return item.pais === p; }).length;
            col.innerHTML = '<h3>' + p + '</h3><div style="margin-bottom:0.5rem;">🏆 ' + totalMedallas + ' medallas</div>';
            var items = podio[p];
            if (items.length === 0) {
                col.innerHTML += '<div>Sin datos</div>';
            } else {
                items.forEach(function(b) {
                    var itemDiv = document.createElement('div');
                    itemDiv.className = 'podio-item';
                    var tooltipHtml = obtenerDetalleCervezas(b.name, data);
                    itemDiv.innerHTML = b.name + '<br><span class="medal-count">' + b.count + ' medallas</span><div class="tooltip-box">' + tooltipHtml + '</div>';
                    col.appendChild(itemDiv);
                });
            }
            container.appendChild(col);
        });
    }

    function renderMicroGraficos(data) {
        // Global
        var estilosGlobal = {};
        data.forEach(function(item) {
            var estilo = item.estilo;
            if (esBasura(estilo)) return;
            estilosGlobal[estilo] = (estilosGlobal[estilo] || 0) + 1;
        });
        var topGlobal = Object.keys(estilosGlobal).map(function(e) { return { name: e, value: estilosGlobal[e] }; })
            .sort(function(a,b) { return b.value - a.value; }).slice(0,5);
        var ctx1 = document.getElementById('topEstilosGlobalChart').getContext('2d');
        if (topEstilosGlobal) topEstilosGlobal.destroy();
        topEstilosGlobal = new Chart(ctx1, {
            type: 'bar',
            data: { labels: topGlobal.map(function(e) { return e.name; }), datasets: [{ label: 'Medallas', data: topGlobal.map(function(e) { return e.value; }), backgroundColor: '#e32c6c' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
        });
        // Chile
        var chileData = data.filter(function(item) { return item.pais === 'Chile'; });
        var estilosChile = {};
        chileData.forEach(function(item) {
            var estilo = item.estilo;
            if (esBasura(estilo)) return;
            estilosChile[estilo] = (estilosChile[estilo] || 0) + 1;
        });
        var topChile = Object.keys(estilosChile).map(function(e) { return { name: e, value: estilosChile[e] }; })
            .sort(function(a,b) { return b.value - a.value; }).slice(0,5);
        var ctx2 = document.getElementById('topEstilosChileChart').getContext('2d');
        if (topEstilosChile) topEstilosChile.destroy();
        topEstilosChile = new Chart(ctx2, {
            type: 'bar',
            data: { labels: topChile.map(function(e) { return e.name; }), datasets: [{ label: 'Medallas', data: topChile.map(function(e) { return e.value; }), backgroundColor: '#1eab9b' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
        });
        // Regiones
        var regionesMap = {
            'Santiago': 'Metropolitana', 'Valparaíso': 'Valparaíso', 'Concepción': 'Biobío',
            'Talca': 'Maule', 'La Serena': 'Coquimbo', 'Antofagasta': 'Antofagasta',
            'Temuco': 'Araucanía', 'Rancagua': 'O\'Higgins', 'Puerto Montt': 'Los Lagos',
            'Valdivia': 'Los Ríos', 'Viña del Mar': 'Valparaíso', 'Chillán': 'Ñuble'
        };
        var regiones = {};
        chileData.forEach(function(item) {
            var ciudad = item.ciudad;
            if (esBasura(ciudad)) return;
            var region = regionesMap[ciudad] || ciudad;
            regiones[region] = (regiones[region] || 0) + 1;
        });
        var topRegiones = Object.keys(regiones).map(function(r) { return { name: r, value: regiones[r] }; })
            .sort(function(a,b) { return b.value - a.value; }).slice(0,5);
        var ctx3 = document.getElementById('topRegionesChileChart').getContext('2d');
        if (topRegionesChile) topRegionesChile.destroy();
        topRegionesChile = new Chart(ctx3, {
            type: 'bar',
            data: { labels: topRegiones.map(function(r) { return r.name; }), datasets: [{ label: 'Medallas', data: topRegiones.map(function(r) { return r.value; }), backgroundColor: '#f7c32f' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
        });
    }

    function updateStats(data) {
        if (!data.length) return;
        var total = data.length;
        var oro = data.filter(function(d) { return d.medalla_base && d.medalla_base.toLowerCase() === 'oro'; }).length;
        var certamenes = new Set();
        data.forEach(function(d) { if (d.certamen) certamenes.add(d.certamen); });
        var statsDiv = document.getElementById('stats-placeholder').children;
        statsDiv[0].children[0].innerText = total;
        statsDiv[1].children[0].innerText = oro;
        statsDiv[2].children[0].innerText = certamenes.size;
    }

    function renderTable(data, searchTerm) {
        var tbody = document.getElementById('tableBody');
        var filtered = data;
        if (searchTerm && searchTerm !== "") {
            var lower = searchTerm.toLowerCase();
            filtered = data.filter(function(row) {
                return (row.certamen || '').toLowerCase().indexOf(lower) !== -1 ||
                    (row.estilo || '').toLowerCase().indexOf(lower) !== -1 ||
                    (row.medalla_base || '').toLowerCase().indexOf(lower) !== -1 ||
                    (row.pais || '').toLowerCase().indexOf(lower) !== -1 ||
                    (row.cerveceria || '').toLowerCase().indexOf(lower) !== -1 ||
                    (row.cerveza_ganadora || '').toLowerCase().indexOf(lower) !== -1;
            });
        }
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No hay coincidencias</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < Math.min(filtered.length, 200); i++) {
            var item = filtered[i];
            var med = (item.medalla_base || '').toLowerCase();
            var medClass = '';
            if (med === 'oro') medClass = 'medal-gold';
            else if (med === 'plata') medClass = 'medal-silver';
            else if (med === 'bronce') medClass = 'medal-bronze';
            html += '<tr>' +
                '<td>' + (item.certamen || '-') + '</td>' +
                '<td>' + (item.fecha || item.anio || '-') + '</td>' +
                '<td class="blur-column">' + (item.cerveceria || '-') + '</td>' +
                '<td class="blur-column">' + (item.cerveza_ganadora || '-') + '</td>' +
                '<td>' + (item.estilo || '-') + '</td>' +
                '<td class="' + medClass + '">' + (item.medalla_base || '-') + '</td>' +
                '<td>' + (item.pais || '-') + '</td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    }

    // ======================== INICIALIZACIÓN ========================
    function init() {
        cargarCSV(function(err, data) {
            if (err || !data.length) {
                showError("No se pudieron cargar los datos: " + (err ? err.message : "archivo vacío"));
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7">⚠️ Error cargando datos. Verifica el archivo CSV.</td></tr>';
                return;
            }
            allData = data;
            updateStats(data);
            renderEvolucionMensual(data);
            renderRankingChile(data);
            renderPodio(data);
            renderMicroGraficos(data);
            renderTable(data, '');

            var searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                renderTable(allData, e.target.value);
            });
        });
    }

    init();
</script>
