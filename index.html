<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodiumBeer - Ranking de Cervecerías</title>
    
    <!-- Fuente estilo Bloomberg -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header con logo y fondo -->
        <header class="header">
            <div class="logo-container">
                <img src="assets/logo_podiumbeer.png" alt="PodiumBeer" class="logo">
            </div>
            <h1 class="title">PodiumBeer</h1>
            <p class="subtitle">Ranking de cervecerías por medallas</p>
        </header>

        <!-- Ranking con barras horizontales apiladas -->
        <section class="ranking-section">
            <h2 class="section-title">🏆 Ranking por Medallas</h2>
            <div class="chart-container">
                <canvas id="rankingChart"></canvas>
            </div>
        </section>

        <!-- Tabla con blur -->
        <section class="table-section">
            <h2 class="section-title">📋 Detalle de Medallas</h2>
            <div class="table-wrapper">
                <table class="medals-table" id="medalsTable">
                    <thead>
                        <tr>
                            <th>Certamen</th>
                            <th>País</th>
                            <th>Estilo</th>
                            <th>Medalla</th>
                            <th>Fecha</th>
                            <th class="blur-column">Cervecería</th>
                            <th class="blur-column">Cerveza</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="loading">Cargando datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Footer con redes sociales -->
        <footer class="footer">
            <div class="social-icons">
                <a href="#" target="_blank">
                    <img src="assets/icon_instagram.png" alt="Instagram" class="social-icon">
                </a>
                <a href="#" target="_blank">
                    <img src="assets/icon_web.png" alt="Sitio Web" class="social-icon">
                </a>
                <a href="#" target="_blank">
                    <img src="assets/icon_wpp.png" alt="WhatsApp" class="social-icon">
                </a>
            </div>
            <p class="footer-text">PodiumBeer - Todos los derechos reservados</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/ranking.js"></script>
    <script src="js/table.js"></script>
</body>
</html>
