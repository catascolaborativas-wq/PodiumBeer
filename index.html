<script>
    // ==================== SUS FUNCIONES ORIGINALES (sin cambios) ====================
    function limpiarTexto(texto) {
        if (!texto) return "";
        return texto.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    function formatearTextoPresentacion(str) {
        if (!str) return '';
        str = str.replace(/\bBrewery\b/gi, "Brew.")
                 .replace(/\bBrewing\b/gi, "Brew.")
                 .replace(/\bCompany\b/gi, "Co.")
                 .replace(/\bCompañía\b/gi, "Cia.")
                 .replace(/Colaboración/gi, "(Colab.)");
        return str.replace(/\b\w/g, l => l.toUpperCase());
    }

    function esBasura(valor) {
        if (!valor) return true;
        const limpio = valor.toString().toUpperCase().trim();
        return limpio === "PENDIENTE" || limpio === "COMPLETAR" || limpio === "-";
    }

    let allData = [];

    function showError(msg) {
        const errDiv = document.getElementById('error-message');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        console.error(msg);
    }

    // ==================== ÚNICO CAMBIO: CARGA CON XMLHttpRequest (compatible iOS 12) ====================
    function cargarCSV(callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'BBDD_Medallero_Chile.csv', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200 || xhr.status === 0) {
                    var texto = xhr.responseText;
                    var lineas = texto.split(/\r?\n/);
                    var encabezados = lineas[0].split(';').map(function(h) { return h.trim(); });
                    var datos = [];
                    for (var i = 1; i < lineas.length; i++) {
                        if (!lineas[i].trim()) continue;
                        var valores = lineas[i].split(';');
                        var fila = {};
                        for (var j = 0; j < encabezados.length; j++) {
                            var enc = encabezados[j];
                            var val = valores[j] ? valores[j].trim() : '';
                            if (enc === 'cerveceria' || enc === 'cerveza_ganadora' || enc === 'estilo' || enc === 'certamen') {
                                val = formatearTextoPresentacion(val);
                            }
                            fila[enc] = val;
                        }
                        if (!esBasura(fila.medalla_base) && !esBasura(fila.cerveceria)) {
                            datos.push(fila);
                        }
                    }
                    callback(null, datos);
                } else {
                    callback(new Error("HTTP " + xhr.status), null);
                }
            }
        };
        xhr.onerror = function() {
            callback(new Error("Error de red o archivo no encontrado"), null);
        };
        xhr.send();
    }

    function init() {
        cargarCSV(function(err, data) {
            if (err || !data.length) {
                showError("Error cargando datos: " + (err ? err.message : "archivo vacío"));
                return;
            }
            allData = data;
