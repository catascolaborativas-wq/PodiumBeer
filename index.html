<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PodiumBeer - Resultados</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 16px;
        }

        /* Contenedor principal */
        .container {
            max-width: 768px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Tabla responsive: se desborda horizontalmente */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }

        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f8f8;
            font-weight: 600;
        }

        /* Tarjetas en lugar de tabla para pantallas muy pequeñas (opcional) */
        @media (max-width: 600px) {
            .table-wrapper {
                overflow-x: auto;
            }
        }

        /* Estilo para títulos */
        h1 {
            font-size: 24px;
            padding: 16px;
            background-color: #2c3e50;
            color: white;
            margin: 0;
        }

        /* Mensaje de error o carga */
        .error {
            color: red;
            padding: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PodiumBeer - Resultados</h1>
        <div class="table-wrapper">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>Certamen</th>
                        <th>Origen</th>
                        <th>Año</th>
                        <th>Cervecería</th>
                        <th>Cerveza</th>
                        <th>Estilo</th>
                        <th>Premio</th>
                        <th>País</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="8">Cargando datos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Aquí usted puede cargar los datos desde un CSV o desde una variable JavaScript.
        // Ejemplo de datos estáticos:
        const datos = [
            ["World Beer Awards", "Internacional", "2025", "Diebels", "Freundliche Alt", "Altbier", "GOLD - COUNTRY WINNER", "Germany"],
            // agregar más filas...
        ];

        function cargarTabla() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if (datos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">No hay datos</td></tr>';
                return;
            }
            for (let i = 0; i < datos.length; i++) {
                const fila = datos[i];
                const tr = document.createElement('tr');
                for (let j = 0; j < fila.length; j++) {
                    const td = document.createElement('td');
                    td.textContent = fila[j];
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        cargarTabla();
    </script>
</body>
</html>
